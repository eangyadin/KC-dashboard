<!DOCTYPE html>
<html lang="km" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ប្រព័ន្ធសាលាបឋមសិក្សាកញ្ជ្រៀច</title>
    <link href="https://fonts.googleapis.com/css2?family=Moul&family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    
    <style>
        body { font-family: 'Kantumruy Pro', sans-serif; background: #f8fafc; }
        .font-moul { font-family: 'Moul', cursive; }
        .glass-nav { background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(10px); }
        /* Optimization: ធានាថាលើទូរស័ព្ទមិនបាត់ទ្រង់ទ្រាយ */
        @media (max-width: 640px) { .container { padding-left: 1rem; padding-right: 1rem; } }
    </style>
</head>
<body class="text-slate-800 antialiased overflow-x-hidden">

    <!-- Header -->
    <header class="glass-nav text-white sticky top-0 z-50 border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-xl overflow-hidden border border-yellow-400/30">
                    <img src="./1.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <h1 class="font-moul text-lg text-yellow-400 truncate">សាលាបឋមសិក្សាកញ្ជ្រៀច</h1>
            </div>
            <nav class="hidden md:flex gap-4 text-sm">
                <a href="#overview" class="hover:text-yellow-400">ទិន្នន័យ</a>
                <a href="#charts" class="hover:text-yellow-400">ស្ថិតិ</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 py-6 space-y-6">
        <!-- Stats Grid - លឿននិងឆ្លើយតបគ្រប់ទំហំ -->
        <section id="overview" class="grid grid-cols-2 lg:grid-cols-4 gap-3">
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-blue-600">
                <p class="text-[10px] text-slate-400 uppercase">សិស្សសរុប</p>
                <h3 class="text-xl font-bold">២៩២</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-pink-500">
                <p class="text-[10px] text-slate-400 uppercase">សិស្សស្រី</p>
                <h3 class="text-xl font-bold">២៥០</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-emerald-500">
                <p class="text-[10px] text-slate-400 uppercase">គ្រូ</p>
                <h3 class="text-xl font-bold">១៧</h3>
            </div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border-l-4 border-amber-500">
                <p class="text-[10px] text-slate-400 uppercase">ថ្នាក់រៀន</p>
                <h3 class="text-xl font-bold">១៣</h3>
            </div>
        </section>

        <!-- About Section -->
        <section id="about" class="bg-white p-6 rounded-2xl shadow-sm">
            <h3 class="font-moul text-blue-900 mb-3">ប្រវត្តិសាលា</h3>
            <img src="./photo_2025-12-27_06-50-06.jpg" alt="សាលា" class="w-full h-48 object-cover rounded-xl mb-4">
            <p class="text-sm text-slate-600 leading-relaxed">សាលាបឋមសិក្សាកញ្ជ្រៀច ផ្តល់ការអប់រំមូលដ្ឋានដល់កុមារគ្រប់រូបក្នុងសហគមន៍...</p>
        </section>

        <!-- Charts Section -->
        <section id="charts" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="bg-white p-4 rounded-2xl shadow-sm"><canvas id="studentChart" class="max-h-60"></canvas></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm"><canvas id="attendanceChart" class="max-h-60"></canvas></div>
        </section>
    </main>

    <footer class="text-center py-6 text-xs text-slate-500">
        © 2026 សាលាបឋមសិក្សាកញ្ជ្រៀច | គ្រប់គ្រងដោយ៖ លោកគ្រូ អ៊ាង យ៉ាឌីន
    </footer>

    <script>
        // Optimization: កាត់បន្ថយ animation លើទូរស័ព្ទដើម្បីកុំឱ្យយឺត
        const isMobile = window.innerWidth < 768;
        Chart.defaults.animation = !isMobile;

        const ctxStudent = document.getElementById('studentChart').getContext('2d');
        new Chart(ctxStudent, {
            type: 'bar',
            data: {
                labels: ['ថ១', 'ថ២', 'ថ៣', 'ថ៤', 'ថ៥', 'ថ៦'],
                datasets: [
                    { label: 'ប្រុស', data: [5, 6, 8, 7, 7, 9], backgroundColor: '#2563eb' },
                    { label: 'ស្រី', data: [42, 43, 41, 40, 44, 40], backgroundColor: '#db2777' }
                ]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxAttendance = document.getElementById('attendanceChart').getContext('2d');
        new Chart(ctxAttendance, {
            type: 'line',
            data: {
                labels: ['តុលា', 'វិច្ឆិកា', 'ធ្នូ', 'មករា', 'កុម្ភៈ', 'មីនា'],
                datasets: [{ label: '%វត្តមាន', data: [95, 96, 94, 97, 95, 96], borderColor: '#10b981', fill: true }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    </script>
</body>
</html>
